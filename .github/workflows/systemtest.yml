name: BluLedger System Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  systemtest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            systemtest/package-lock.json

      - name: Install app dependencies
        run: npm install --no-audit --no-fund

      - name: Install system test dependencies
        working-directory: systemtest
        run: npm ci

      - name: Install Playwright browsers
        working-directory: systemtest
        run: npx playwright install --with-deps chromium

      - name: Typecheck system tests
        working-directory: systemtest
        run: npm run typecheck

      - name: Start BluLedger app
        run: npm run dev -- --host 127.0.0.1 --port 5173 --strictPort > /tmp/bluledger-vite.log 2>&1 &

      - name: Wait for BluLedger app
        run: |
          for attempt in $(seq 1 120); do
            if curl --silent --fail http://127.0.0.1:5173/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "BluLedger app did not start in time"
          cat /tmp/bluledger-vite.log || true
          exit 1

      - name: Run BluLedger system tests
        working-directory: systemtest
        env:
          PW_DISABLE_LOCAL_DEMO_APPS: 'true'
        run: npm test

      - name: Upload system test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bluledger-systemtest-artifacts
          path: |
            systemtest/reports
            systemtest/allure-results
            systemtest/test-results
            /tmp/bluledger-vite.log
          if-no-files-found: ignore
